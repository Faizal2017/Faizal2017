name: Generate Pac-Man Contribution Graph

on:
  schedule:
    # Run automatically every 24 hours (at 00:00 UTC)
    - cron: '0 0 * * *'

  workflow_dispatch:          # Allows manual triggering from GitHub UI
  push:                       # Run on every push to main branch
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write         # Required to push to another branch

    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      # Optional: if the action doesn't create the file in the expected location
      # you may need to add: cp pacman-contribution-graph.svg dist/  or similar

      - name: Push pacman-contribution-graph.svg to output branch
        uses: crazy-max/ghaction-github-pages@v4   # ← updated to latest version
        with:
          target_branch: output
          build_dir: .                               # ← most important change
          # folder where the .svg file was created by previous step
          # usually it's in the repository root (.)
          commit_message: "chore: update pacman contribution graph"
          keep_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
